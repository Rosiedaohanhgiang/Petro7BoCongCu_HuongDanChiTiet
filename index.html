TOOLS.forEach((t,i)=>{

    h.className='px-3 pt-4 pb-1.5 text-[9.5px] font-cond font-bold tracking-[.16em]';

  a.className='sidelink w-full text-left rounded-xl px-3 py-2.5 flex items-center gap-3 hover:bg-white/8 transition group';

});

    </section>

    <!-- 7. TRIỂN KHAI -->
    <section class="mb-12">
      ${sectionLabel('roll','07 · TRIỂN KHAI THẾ NÀO',c)}
      <ol class="space-y-4 glass rounded-2xl p-6">${rollout}</ol>
    </section>

    <!-- 8. DEMO -->
    <section class="mb-6">
      ${sectionLabel('play','08 · THỬ NGAY — DEMO TƯƠNG TÁC',c)}
      <div class="glass rounded-3xl p-6 sm:p-8" id="demo"></div>
    </section>

    <nav class="flex items-center justify-between gap-4 pt-8 mt-4 border-t border-white/10">
      <button ${i===0?'disabled':''} onclick="render(${i-1})" class="inline-flex items-center gap-2 text-[14px] font-semibold ${i===0?'text-white/20':'text-white/70 hover:text-white'} transition">
        ${svgIcon('<path d="M19 12H5M11 18l-6-6 6-6"/>')} ${i===0?'Đầu tiên':TOOLS[i-1]?.name||''}
      </button>
      <button ${i===TOOLS.length-1?'disabled':''} onclick="render(${i+1})" class="inline-flex items-center gap-2 text-[14px] font-semibold ${i===TOOLS.length-1?'text-white/20':'text-white/70 hover:text-white'} transition">
        ${i===TOOLS.length-1?'Cuối cùng':TOOLS[i+1]?.name||''} ${svgIcon('<path d="M5 12h14M13 6l6 6-6 6"/>')}
      </button>
    </nav>
  </article>`;

  buildDemo(t, c);
  content.scrollIntoView({behavior:'smooth',block:'start'});
  window.scrollTo({top:0, behavior:'smooth'});
}

            <div class="text-[11px] font-cond font-bold tracking-wide text-teal">CÂU NÊN NÓI</div>

          </div>
          <div class="mt-3 rounded-2xl bg-red-400/10 border-l-4 border-red-400 p-4">
            <div class="text-[11px] font-cond font-bold tracking-wide text-red-300">KHÔNG NÊN LÀM</div>

      </div>`;
    const sel=d.querySelector('[data-kbsel]'), say=d.querySelector('[data-kbsay]'), no=d.querySelector('[data-kbno]');
    const upd=()=>{ const m=map[sel.value]; say.textContent=m[0]; no.textContent=m[1]; };
    sel.addEventListener('change',upd); upd();

  else if(t.demo==='ulrich'){
    const roles=[['Đối tác chiến lược','#5C8DF0',5,20],['Tác nhân thay đổi','#F25A19',10,15],['Chuyên gia vận hành','#FFB400',70,55],['Đại diện nhân viên','#16A07A',15,10]];
    d.innerHTML=`
      <p class="text-[14px] text-white/60 mb-5">Kéo thanh trượt cho <b class="text-white">% thời gian tuần qua</b>. Cột mờ là mục tiêu mong muốn quý tới.</p>
      <div class="space-y-4">
        ${roles.map((r,i)=>`<div>
          <div class="flex items-center justify-between text-[13.5px] mb-1.5">

            <span><span data-uv class="font-cond font-bold text-lg" style="color:${r[1]}">${r[2]}%</span><span class="text-white/40 text-[12px]"> / mong muốn ${r[3]}%</span></span>
          </div>
          <div class="relative h-3 rounded-full bg-white/10 overflow-hidden">
            <div class="absolute inset-y-0 left-0 rounded-full opacity-30" style="width:${r[3]}%;background:${r[1]}"></div>
            <div data-ub class="absolute inset-y-0 left-0 rounded-full transition-all" style="width:${r[2]}%;background:${r[1]}"></div>
          </div>
          <input type="range" min="0" max="80" value="${r[2]}" data-ur class="w-full mt-2">
        </div>`).join('')}
      </div>
      <div class="mt-5 flex items-center gap-3 text-[14px]"><span class="text-white/60">Tổng:</span><span data-ut class="font-cond font-bold text-lg text-white"></span><span data-uf class="text-[12.5px]"></span></div>`;
    const recompute=()=>{
      let total=0;
      d.querySelectorAll('[data-ur]').forEach((r,i)=>{ const v=+r.value, box=r.closest('div').parentElement;
        box.querySelector('[data-uv]').textContent=v+'%'; box.querySelector('[data-ub]').style.width=v+'%'; total+=v; });

    const msg=d.querySelector('[data-cvmsg]');
    d.querySelectorAll('[data-cv]').forEach(el=>el.addEventListener('input',()=>{

  else if(t.demo==='hexagon'){
    const axes=['Công việc','Niềm tin','Tác phong','Giao tiếp','Tác động','Động lực'];
    const self=[4,2,4,4,2,3], peer=[4,3,4,2,2,3];
    d.innerHTML=`
      <div class="grid lg:grid-cols-2 gap-6 items-start">

            <span class="flex items-center gap-2"><span class="w-6 h-0 border-t-2 border-dashed border-sky"></span>Đồng nghiệp</span>
          </div>
        </div>
        <div class="space-y-2.5">
          <div class="grid grid-cols-[1fr_auto_auto] gap-2 text-[11px] font-cond font-bold tracking-wide text-white/40 px-1"><span></span><span class="text-energy-300 w-16 text-center">TỰ CHẤM</span><span class="text-sky w-16 text-center">ĐỒNG NGHIỆP</span></div>
          ${axes.map((a,i)=>`<div class="grid grid-cols-[1fr_auto_auto] gap-2 items-center">
            <span class="text-[13px] text-white/80">${a}</span>
            <input type="range" min="1" max="5" value="${self[i]}" data-hs class="w-16">
            <input type="range" min="1" max="5" value="${peer[i]}" data-hp class="w-16">
          </div>`).join('')}
          <div data-hxout class="mt-4 rounded-2xl glass-soft p-4 text-[13.5px] text-white/80 leading-relaxed"></div>
        </div>
      </div>`;
    const svg=d.querySelector('[data-hx]'); const NS='http://www.w3.org/2000/svg'; const cx=140,cy=200,R=120;
    const ang=i=>(-90+60*i)*Math.PI/180; const P=(r,i)=>[cx+r*Math.cos(ang(i)),cy+r*Math.sin(ang(i))];
    function poly(r){ return Array.from({length:6},(_,i)=>P(r,i).map(n=>n.toFixed(1)).join(',')).join(' '); }
    function el(tag,a){ const n=document.createElementNS(NS,tag); for(const k in a)n.setAttribute(k,a[k]); return n; }
    function draw(){
      svg.innerHTML='';
      [1,2,3,4,5].forEach(k=>svg.appendChild(el('polygon',{points:poly(R*k/5),fill:'none',stroke:'rgba(255,255,255,.12)'})));
      for(let i=0;i<6;i++){ const [x,y]=P(R,i); svg.appendChild(el('line',{x1:cx,y1:cy,x2:x,y2:y,stroke:'rgba(255,255,255,.12)'})); }
      axes.forEach((a,i)=>{ const [x,y]=P(R+24,i); const anc=Math.abs(x-cx)<6?'middle':(x>cx?'start':'end');
        const tx=el('text',{x:x.toFixed(1),y:(y+(y<cy-6?-2:(y>cy+6?12:4))).toFixed(1),'text-anchor':anc,'font-size':11,'font-weight':700,fill:'#E9ECFF'}); tx.textContent=a.toUpperCase(); svg.appendChild(tx); });
      const sv=[...d.querySelectorAll('[data-hs]')].map(r=>+r.value);
      const pv=[...d.querySelectorAll('[data-hp]')].map(r=>+r.value);
      svg.appendChild(el('polygon',{points:sv.map((v,i)=>P(R*v/5,i).map(n=>n.toFixed(1)).join(',')).join(' '),fill:'rgba(242,90,25,.26)',stroke:'#F25A19','stroke-width':2.5}));
      svg.appendChild(el('polygon',{points:pv.map((v,i)=>P(R*v/5,i).map(n=>n.toFixed(1)).join(',')).join(' '),fill:'none',stroke:'#5C8DF0','stroke-width':2,'stroke-dasharray':'5 4'}));
      // analysis
      const minIdx=sv.map((v,i)=>[v,i]).sort((a,b)=>a[0]-b[0]).slice(0,2).map(x=>axes[x[1]]);
      let gapIdx=-1,gap=0; sv.forEach((v,i)=>{ if(Math.abs(v-pv[i])>gap){gap=Math.abs(v-pv[i]);gapIdx=i;} });
      const out=d.querySelector('[data-hxout]');
      out.innerHTML = `<b class="text-energy-300">2 mặt thấp nhất để đầu tư:</b> ${minIdx.join(' · ')}.<br>`+
        (gap>=2 ? `<b class="text-sky">Điểm mù lớn nhất:</b> "${axes[gapIdx]}" — chênh ${gap} điểm giữa bạn và đồng nghiệp. Đáng kiểm chứng.` : `<span class="text-white/55">Chưa có điểm mù lớn (mọi mặt chênh dưới 2 điểm).</span>`);
    }
    d.querySelectorAll('[data-hs],[data-hp]').forEach(r=>r.addEventListener('input',draw)); draw();
  }
  else if(t.demo==='action'){
    d.innerHTML=`
      <p class="text-[14px] text-white/60 mb-5">Viết một dòng "BẮT ĐẦU" đủ 3 mảnh. Thanh hoàn thành sẽ sáng khi đủ cả ba.</p>
      <div class="rounded-2xl border border-dashed border-energy/50 bg-energy/5 p-5 space-y-4">
        <label class="block"><span class="text-[12px] font-cond font-bold tracking-wide text-sky">TINY HABIT — việc nhỏ tới mức không thể từ chối</span>
          <input data-ac class="mt-1 w-full bg-white/5 border border-white/15 rounded-xl p-3 text-[14px] text-white placeholder-white/30 focus:border-sky outline-none" placeholder="vd: mỗi sáng mở canvas xem 1 ô"></label>
        <label class="block"><span class="text-[12px] font-cond font-bold tracking-wide text-teal">TRIGGER — "sau khi… thì tôi sẽ…"</span>
          <input data-ac class="mt-1 w-full bg-white/5 border border-white/15 rounded-xl p-3 text-[14px] text-white placeholder-white/30 focus:border-teal outline-none" placeholder="vd: sau khi rót cà phê sáng, tôi sẽ mở canvas"></label>
        <label class="block"><span class="text-[12px] font-cond font-bold tracking-wide text-gold">IDENTITY — "Tôi là người…"</span>
          <input data-ac class="mt-1 w-full bg-white/5 border border-white/15 rounded-xl p-3 text-[14px] text-white placeholder-white/30 focus:border-gold outline-none" placeholder="vd: Tôi là cán bộ nhân sự tư duy chiến lược"></label>
        <div class="h-2 rounded-full bg-white/10 overflow-hidden"><div data-acbar class="h-full rounded-full bg-gradient-to-r from-sky via-teal to-gold transition-all" style="width:0%"></div></div>
        <div data-acmsg class="text-[13px] text-white/45"></div>
      </div>`;
    const upd=()=>{ const f=[...d.querySelectorAll('[data-ac]')].filter(x=>x.value.trim().length>2).length;
      d.querySelector('[data-acbar]').style.width=(f/3*100)+'%';
      const m=d.querySelector('[data-acmsg]');
      m.textContent = f===3?'✓ Một cam kết hoàn chỉnh — nhỏ, có mỏ neo, gắn danh tính. Đây là dạng bền nhất.':`Đủ ${f}/3 mảnh.`;
      m.style.color=f===3?'#16A07A':'rgba(255,255,255,.45)';
    };
    d.querySelectorAll('[data-ac]').forEach(el=>el.addEventListener('input',upd));
  }
}

    <rect x="0" y="150" width="360" height="150" fill="#0a1252"/>
    <line x1="0" y1="150" x2="360" y2="150" stroke="#5C8DF0" stroke-width="2" stroke-dasharray="6 5" opacity="0.7"/>

function vizKubler(){
  return `<svg viewBox="0 0 520 260" class="w-full h-auto" role="img" aria-label="Đường cong cảm xúc Kübler-Ross từ sốc xuống đáy rồi lên chấp nhận.">
    <defs><linearGradient id="kg2" x1="0" x2="1"><stop offset="0" stop-color="#5C8DF0"/><stop offset="0.5" stop-color="#F25A19"/><stop offset="1" stop-color="#16A07A"/></linearGradient></defs>
    <line x1="30" y1="220" x2="500" y2="220" stroke="rgba(255,255,255,.18)"/>
    <path d="M30 70 C 90 60, 110 120, 150 150 S 230 220, 270 215 S 360 150, 420 110 S 480 70, 500 60" fill="none" stroke="url(#kg2)" stroke-width="4" stroke-linecap="round"/>
    ${[['Sốc',40,64,'#5C8DF0'],['Chối bỏ',120,150,'#5C8DF0'],['Tức giận',200,205,'#F25A19'],['Mặc cả',270,215,'#F25A19'],['Chấp nhận',390,118,'#16A07A'],['Cam kết',480,66,'#16A07A']].map(p=>`
      <circle cx="${p[1]}" cy="${p[2]}" r="6" fill="${p[3]}" stroke="#fff" stroke-width="1.5"/>
      <text x="${p[1]}" y="${p[2]>160?p[2]+22:p[2]-12}" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">${p[0]}</text>`).join('')}
    <text x="265" y="248" text-anchor="middle" font-size="10" fill="rgba(255,255,255,.5)">Thời gian → (đừng thúc ép người đang ở đáy)</text>
  </svg>`;
}

/* =======================================================================
   MOBILE SIDEBAR + INIT
   ======================================================================= */
const sidebar=document.getElementById('sidebar'), backdrop=document.getElementById('backdrop');
function openSide(){ sidebar.classList.remove('-translate-x-full'); backdrop.classList.remove('hidden'); }
function closeSide(){ sidebar.classList.add('-translate-x-full'); backdrop.classList.add('hidden'); }
document.getElementById('menuBtn').addEventListener('click',openSide);
document.getElementById('closeBtn').addEventListener('click',closeSide);
backdrop.addEventListener('click',closeSide);

render(0);
</script>
</body>
